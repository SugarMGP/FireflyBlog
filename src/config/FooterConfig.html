<div class="m-0.5">
  <span id="timeDate">本站已航行 0 天</span>
  <span id="times">00 小时 00 分 00 秒</span>
</div>
<div class="m-0.5">
  <a
    class="transition link text-(--primary) font-medium"
    href="https://icp.gov.moe/?keyword=20250998"
    target="_blank"
    rel="nofollow noopener"
  >萌ICP备20250998号</a>
</div>
<script>
  (() => {
    const startTime = new Date("2024-10-19T20:26:35+08:00");

    function updateSiteRuntime() {
      const now = new Date();
      const diffSeconds = Math.max(0, Math.floor((now.getTime() - startTime.getTime()) / 1000));
      const days = Math.floor(diffSeconds / 86400);
      const hours = Math.floor((diffSeconds % 86400) / 3600);
      const minutes = Math.floor((diffSeconds % 3600) / 60);
      const seconds = diffSeconds % 60;

      const timeDate = document.getElementById("timeDate");
      const times = document.getElementById("times");
      if (!timeDate || !times) return;

      timeDate.textContent = `本站已航行 ${days} 天`;
      times.textContent = `${String(hours).padStart(2, "0")} 小时 ${String(minutes).padStart(2, "0")} 分 ${String(seconds).padStart(2, "0")} 秒`;
    }

    updateSiteRuntime();
    setInterval(updateSiteRuntime, 1000);
  })();
</script>
